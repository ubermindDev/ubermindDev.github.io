baseURL = "https://ubermindDev.github.io/"
languageCode = "ko-kr"
title = "ubermind.dev"
theme = "stack"

[params]
    description = "심연을 들여다보는 개발자 | 코드로 쓰는 차라투스트라"
    customCSS = ["scss/custom.scss"]
    
    # [차라투스트라의 사이드바]
    [params.sidebar]
        avatar = "https://github.com/ubermindDev.png"
        title = "ubermind"
        subtitle = "심연을 들여다보는 개발자 \n 코드로 쓰는 차라투스트라"
        emoji = "🕳️"

    # [미니멀리스트 카오스]
    [params.main]
        layout = "list" # grid보다 list가 글에 더 집중됨
        showPostReadingTime = true

    # [The Abyss Look] 다크/라이트 모드 지원
    [params.darkmode]
        toggle = true # 토글을 살려서 사용자가 선택할 수 있게 함
        default = "dark"

    # 소셜 아이콘
    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/ubermindDev"

# 메뉴 설정
[[menu.main]]
    name = "나의 투쟁 (Archives)"
    url = "/posts/"
    weight = 1
[[menu.main]]
    name = "Stock Analysis"
    url = "/categories/stock-analysis/"
    weight = 2
[[menu.main]]
    name = "Trail Running"
    url = "/categories/trail-running/"
    weight = 3

# 위젯 설정 (미니멀하게)
[[params.widgets.homepage]]
    type = "search"
[[params.widgets.homepage]]
    type = "archives"
