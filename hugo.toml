baseURL = "https://ubermindDev.github.io/"
languageCode = "ko-kr"
title = "ubermind.dev"
theme = "stack"

[params]
    description = "Building AI Stock Systems | IT Developer | Trail Runner"
    
    # [인스타 느낌 1] 왼쪽 프로필 사이드바
    [params.sidebar]
        avatar = "https://github.com/ubermindDev.png"
        title = "ubermind"
        subtitle = "IT Developer | 33yo | AI Project"

    # [인스타 느낌 2] 메인 화면 격자(Grid) 카드 레이아웃
    [params.main]
        layout = "grid" 
        showPostReadingTime = true

    # [인스타 느낌 3] 힙한 다크 모드 고정
    [params.darkmode]
        toggle = true
        default = "dark"

    # 소셜 아이콘 (에러 방지를 위해 간단히 설정)
    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/ubermindDev"

# 메뉴 설정 (사이드바 버튼)
[[menu.main]]
    name = "Feed"
    url = "/"
    weight = 1
[[menu.main]]
    name = "Archive"
    url = "/posts/"
    weight = 2